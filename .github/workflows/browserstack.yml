name: "Cypress_BrowserStack_Test"

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - uses: browserstack/github-actions/setup-env@93aebce225b754566349151c0676b26b005e591b # master
        with:
          username: ${{ secrets.BROWSER_STACK_USERNAME }}
          access-key: ${{ secrets.BROWSER_STACK_ACCESS_KEY }}
      - uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb # v1.12.1
      - name: Run BrowserStack Tests
        run: npm run test:cypress:browserstack
        timeout-minutes: 15
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSER_STACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSER_STACK_ACCESS_KEY }}
